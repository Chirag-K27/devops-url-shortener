apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-db-secret
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.database.credentials.user }}
  POSTGRES_PASSWORD: {{ .Values.database.credentials.password }}
  POSTGRES_DB: {{ .Values.database.credentials.dbName }}
  DATABASE_URL: postgresql+asyncpg://{{ .Values.database.credentials.user }}:{{ .Values.database.credentials.password }}@db-service:5432/{{ .Values.database.credentials.dbName }}
